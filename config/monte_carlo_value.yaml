# Configuration for Monte Carlo value estimation on 2D slices.
#
# For each system, specify:
# - slices: which two state dimensions to vary and fixed values for others
# - grid_resolution: number of points along each of the two varying dims
# - dt: integration timestep (seconds) for simulation rollouts
# - total_samples_per_state: total Monte Carlo rollouts per initial state
# - snapshot_samples: list of cumulative sample counts at which to save snapshots
#
# Time horizon and rollout batch size are taken from the System (time_horizon, _batch_size).

RoverDark:
  default:
    slices:
      vary_dims: [0, 1]        # indices of state dims to vary (e.g., x, y)
      fixed:
        2: 0.0                 # fix theta = 0
    grid_resolution: [100, 100]
    dt: 0.01
    total_samples_per_state: 10000
    snapshot_samples: [10, 100, 1000, 10000]
    control: GridInput
    control-tag: RoverDark_MPC
